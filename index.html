<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kanban-project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <h1>kanban</h1>
            <button id="addTask" >add Task</button>
        </nav>
        <section>
            <div id="todo" class="task-column ">
                <div class="heading">
                    <h2>Todo</h2>
                    <h2 class="Count" >Count</h2>
                </div>
                <div draggable="true" class="task">
                    <h2 >Task 1</h2>
                    <p>task description</p>
                    <button id="delete-btn" >Delete</button>
                </div>
            </div>
            <div id="progress" class="task-column ">
                <div class="heading">
                    <h2>Progress</h2>
                    <h2 class="Count">Count</h2>
                </div>
            </div>
            <div id="done" class="task-column">
                <div class="heading">
                    <h2>Done</h2>
                    <h2 class="Count">Count</h2>
                </div>
            </div>
        </section>
    </main>
    <div class="modal add-new-note">
        <div class="bg"></div>
        <div class="center">

        <input type="text"
        id="add-title"
         placeholder="note heading">
         
        <textarea name="" id="add-desc" placeholder="description"></textarea>
        <button id="add-new-task" >Add Note</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
